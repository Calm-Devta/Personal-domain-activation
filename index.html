<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
      overflow: hidden;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 2px;
    }

    p {
      margin-top: 10px;
      font-size: 1.2rem;
      opacity: 0.8;
    }

    /* Floating shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
      animation: float 8s infinite ease-in-out;
    }

    .shape:nth-child(1) {
      width: 100px;
      height: 100px;
      background: #ff6b6b;
      top: 10%;
      left: 20%;
      animation-delay: 0s;
    }

    .shape:nth-child(2) {
      width: 150px;
      height: 150px;
      background: #6bcBef;
      bottom: 10%;
      right: 20%;
      animation-delay: 2s;
    }

    .shape:nth-child(3) {
      width: 80px;
      height: 80px;
      background: #ffd93d;
      top: 60%;
      left: 10%;
      animation-delay: 4s;
    }

    .shape:nth-child(4) {
      width: 120px;
      height: 120px;
      background: #c77dff;
      top: 30%;
      right: 10%;
      animation-delay: 1s;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
      100% { transform: translateY(0px); }
    }

    /* Glow effect */
    h1 {
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

  </style>
</head>
<body>

  <!-- Floating shapes -->
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>

  <!-- Content -->
  <div>
    <h1>Coming Soon 🚀</h1>
    <p>Something exciting is on the way...</p>
  </div>

</body>
</html>
